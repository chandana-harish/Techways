version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Akash@123
      MYSQL_DATABASE: techways
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pAkash@123"]
      interval: 10s
      retries: 5

  auth-service:
    build: ./Backend
    container_name: auth-service
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techways
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass

  question-service:
    build: ./Microservice/question-service
    container_name: question-service
    ports:
      - "8082:8080"
    depends_on:
      - mysql
      - service-registry
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techways
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass


  quiz-service:
    build: ./Microservice/quiz-service
    container_name: quiz-service
    ports:
      - "8083:8080"
    depends_on:
      - mysql
      - service-registry
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techways
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass

  # 📡 SERVICE REGISTRY (EUREKA)
  service-registry:
    build: ./Microservice/service-registry
    container_name: service-registry
    ports:
      - "8761:8761"

  # 🌐 API GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
      - auth-service
      - question-service
      - quiz-service

  # 🎨 FRONTEND
  frontend:
    build: ./Frontend
    container_name: frontend-app
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  mysql-data:
